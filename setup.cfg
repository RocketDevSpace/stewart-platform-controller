[flake8]
max-line-length = 100
exclude =
    __pycache__,
    .git,
    *.pyc,
    gui/,
    cv/,
    visualization/,
    kinematics/,
    routines/,
    comms/
# Only lint the new clean modules for now.
# Expand this list as each module is refactored.
per-file-ignores =
    tests/*:E501

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
