[flake8]
max-line-length = 100
# Legacy modules excluded until they are refactored. Remove entries as each
# milestone cleans them up. When this list is empty, all code is clean.
exclude =
    .git,
    .claude,
    __pycache__,
    comms,
    cv,
    kinematics,
    routines,
    config.py,
    gui/gui_layout_legacy.py,
    gui/gui_main.py

per-file-ignores =
    # Allow long lines in tests
    tests/*:E501

# NOTE: flake8 now runs on the whole repo (flake8 .) with this exclude list,
# so new modules are automatically linted without any CI config change.

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
# Legacy modules excluded until refactored. Remove entries as milestones clean
# them up. Regex matched against file paths relative to the project root.
exclude = (?x)(
    ^comms/
    | ^cv/
    | ^kinematics/
    | ^routines/
    | ^config\.py$
    | ^gui/gui_layout_legacy\.py$
    | ^gui/gui_main\.py$
    )

# Per-module overrides: suppress errors when legacy modules are imported as
# dependencies by clean code (the exclude list only stops file discovery, not
# dependency analysis).
[mypy-kinematics.*]
ignore_errors = True

[mypy-routines.*]
ignore_errors = True

[mypy-cv.*]
ignore_errors = True

[mypy-config]
ignore_errors = True

# PyQt5 and matplotlib lack type stubs; suppress import-untyped errors so the
# new gui/ modules can be checked without per-file noqa decorations.
[mypy-PyQt5.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True
