[flake8]
max-line-length = 100
# The legacy-module exclude list is empty (2026-07 overhaul): all code is
# linted. Only non-code directories are skipped.
exclude =
    .git,
    .claude,
    __pycache__

per-file-ignores =
    # Allow long lines in tests
    tests/*:E501
    # firmware/wiring_check.py is a standalone rig utility: it builds the "S,..."
    # string inline and takes the port from argv by design (documented exemption
    # from CLAUDE.md hard constraint 4 — it must work with no app code imported).
    firmware/wiring_check.py:E501

# NOTE: flake8 now runs on the whole repo (flake8 .) with this exclude list,
# so new modules are automatically linted without any CI config change.

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
explicit_package_bases = True
# The legacy exclude list is EMPTY as of the 2026-07 overhaul — every module
# is linted and type-checked. Keep it that way.

# PyQt5 and matplotlib lack bundled stubs in the pinned versions; suppress
# import-untyped errors. cv2 (opencv) ships partial stubs; treat as Any too so
# local runs (with PyQt5/cv2 installed) match CI.
[mypy-PyQt5.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True

[mypy-serial.*]
ignore_missing_imports = True
