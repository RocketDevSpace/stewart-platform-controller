[flake8]
max-line-length = 100
per-file-ignores =
    # Allow long lines in tests
    tests/*:E501

# NOTE: flake8 is only run against core/, settings.py, tests/ in CI.
# Old modules (gui/, cv/, kinematics/, etc.) are added here as they are refactored.

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True

# Old modules excluded from mypy until refactored.
[mypy-config]
ignore_errors = True

[mypy-main]
ignore_errors = True
