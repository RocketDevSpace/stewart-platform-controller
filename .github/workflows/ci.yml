name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libglib2.0-0 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 mypy numpy types-pyserial \
            PyQt5 opencv-python-headless

      - name: Lint with flake8
        run: |
          # Runs on the whole repo. Legacy modules are excluded via setup.cfg.
          # New refactored modules are covered automatically — no config change needed.
          flake8 .

      - name: Type check with mypy
        run: |
          # Runs on the whole repo. Legacy modules are excluded via setup.cfg [mypy] exclude.
          # --explicit-package-bases avoids "not a valid package name" error from hyphens.
          mypy . \
            --ignore-missing-imports \
            --explicit-package-bases

      - name: Run tests
        run: |
          pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen
