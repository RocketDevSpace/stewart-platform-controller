name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 mypy numpy

      - name: Lint with flake8
        run: |
          # Only lint new clean modules. Expand as each milestone is refactored.
          flake8 core/ settings.py tests/

      - name: Type check with mypy
        run: |
          # --explicit-package-bases tells mypy to treat the cwd as the package
          # root, which avoids the "not a valid package name" error from the
          # repo directory name containing hyphens.
          mypy core/ settings.py \
            --ignore-missing-imports \
            --explicit-package-bases

      - name: Run tests
        run: |
          pytest tests/ -v
