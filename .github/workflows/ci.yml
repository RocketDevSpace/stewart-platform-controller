name: CI

# NOTE: CI runs on ubuntu for speed/availability, but this is a Windows-only
# desktop app. Unit tests, lint, and type checks are platform-neutral; every
# Windows-specific path (DSHOW camera backend, COM serial ports, real Qt event
# loop against a display) is exercised only by the manual hardware smoke tests
# documented in CLAUDE.md's verification expectations.

on:
  push:
    branches: [main]
  # No base-branch filter: stacked PRs (feature -> feature) must get CI
  # too, not only PRs targeting main.
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Qt runtime libs)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libglib2.0-0 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0

      - name: Install dependencies (same files developers use)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          # Runs on the whole repo. Legacy modules are excluded via setup.cfg.
          flake8 .

      - name: Type check with mypy
        run: |
          # Full dependency set is installed (PyQt5 included), so this run
          # matches what developers see locally with `mypy .`.
          mypy .

      - name: Run tests
        run: |
          pytest -q
        env:
          QT_QPA_PLATFORM: offscreen
